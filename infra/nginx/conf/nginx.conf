server {
    listen 8080;
    server_name 192.168.50.75; # 或者你的網域

    # 1. 前端頁面 (直接由 Nginx 讀取檔案)
    location / {
        root /home/prometheus/project/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. 後端 API (轉發給 Node.js)
    location /api/ {
        proxy_pass http://192.168.50.75:3000; # 你的 Node.js 埠號
        # 關鍵：將真實 IP 傳給 Node.js
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # 增加超時設定，因為 Hosted Inference API 可能需要較久時間回傳
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }
}