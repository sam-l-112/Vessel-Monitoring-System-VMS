services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golang-api
    network_mode: host
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - DB_HOST=127.0.0.1
      - DB_PORT=3306
      - DB_USER=vms_user
      - DB_PASSWORD=vms_password
      - DB_NAME=vms_db
    restart: unless-stopped

