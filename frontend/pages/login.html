<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VMS 登入 - 養殖監控系統">
    <title>VMS 登入 - 養殖監控系統</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/styles.css">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="loginApp" class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header text-center">
                <i class="fas fa-fish fa-3x text-primary mb-3"></i>
                <h2 class="mb-2">養殖監控系統</h2>
                <p class="text-muted">Vessel Monitoring System</p>
            </div>

            <!-- Login Form -->
            <form @submit.prevent="handleLogin" class="login-form">
                <!-- Username Field -->
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="fas fa-user me-2"></i>用戶名稱
                    </label>
                    <input
                        type="text"
                        class="form-control"
                        id="username"
                        v-model="credentials.username"
                        required
                        placeholder="請輸入用戶名稱"
                        :disabled="loading"
                    >
                </div>

                <!-- Password Field -->
                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock me-2"></i>密碼
                    </label>
                    <div class="input-group">
                        <input
                            :type="showPassword ? 'text' : 'password'"
                            class="form-control"
                            id="password"
                            v-model="credentials.password"
                            required
                            placeholder="請輸入密碼"
                            :disabled="loading"
                        >
                        <button
                            class="btn btn-outline-secondary"
                            type="button"
                            @click="showPassword = !showPassword"
                            :disabled="loading"
                        >
                            <i :class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="mb-3 form-check">
                    <input
                        type="checkbox"
                        class="form-check-input"
                        id="rememberMe"
                        v-model="rememberMe"
                        :disabled="loading"
                    >
                    <label class="form-check-label" for="rememberMe">
                        記住我
                    </label>
                </div>

                <!-- Error Message -->
                <div v-if="errorMessage" class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    {{ errorMessage }}
                </div>

                <!-- Success Message -->
                <div v-if="successMessage" class="alert alert-success" role="alert">
                    <i class="fas fa-check-circle me-2"></i>
                    {{ successMessage }}
                </div>

                <!-- Submit Button -->
                <button
                    type="submit"
                    class="btn btn-primary w-100 mb-3"
                    :disabled="loading"
                >
                    <span v-if="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
                    <i v-else class="fas fa-sign-in-alt me-2"></i>
                    {{ loading ? '登入中...' : '登入' }}
                </button>

                <!-- Links -->
                <div class="text-center">
                    <a href="#" class="text-decoration-none me-3">
                        <i class="fas fa-key me-1"></i>忘記密碼？
                    </a>
                    <a href="#" class="text-decoration-none">
                        <i class="fas fa-user-plus me-1"></i>註冊帳號
                    </a>
                </div>
            </form>

            <!-- Footer -->
            <div class="login-footer text-center mt-4">
                <small class="text-muted">
                    © 2026 VMS Team. All rights reserved.
                </small>
            </div>
        </div>

        <!-- Background Elements -->
        <div class="background-elements">
            <div class="floating-element element-1">
                <i class="fas fa-fish"></i>
            </div>
            <div class="floating-element element-2">
                <i class="fas fa-water"></i>
            </div>
            <div class="floating-element element-3">
                <i class="fas fa-chart-line"></i>
            </div>
        </div>
    </div>

    <!-- External JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Application JavaScript -->
    <script src="../js/login.js"></script>
</body>
</html>
